<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice — Naari Somerville</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --ink: #1a1a2e;
    --ink-light: #5a5a7a;
    --accent: #c9a96e;
    --accent-dim: #e8d5b0;
    --bg: #faf9f6;
    --surface: #ffffff;
    --border: #e2ddd6;
    --danger: #d64a4a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  /* Toolbar */
  .toolbar {
    max-width: 860px;
    margin: 0 auto 1.5rem;
    display: flex;
    gap: .75rem;
    flex-wrap: wrap;
    align-items: center;
  }
  .toolbar h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--ink-light);
    flex: 1;
  }
  .btn {
    font-family: 'Inter', sans-serif;
    font-size: .8rem;
    font-weight: 500;
    letter-spacing: .04em;
    padding: .5rem 1.1rem;
    border-radius: 6px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--ink);
    cursor: pointer;
    transition: all .15s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary { background: var(--ink); color: #fff; border-color: var(--ink); }
  .btn.primary:hover { background: #2d2d4e; }

  /* Invoice Card */
  .invoice {
    max-width: 860px;
    margin: 0 auto;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 32px rgba(26,26,46,.07);
  }

  /* Header */
  .inv-header {
    background: var(--ink);
    color: #fff;
    padding: 2rem 2.8rem 1.8rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1.5rem;
    flex-wrap: wrap;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 1.2rem;
  }

  .logo-wrap img {
    width: 72px;
    height: 72px;
    object-fit: contain;
    filter: drop-shadow(0 0 6px rgba(201,169,110,0.3));
  }

  .brand-company {
    font-size: .82rem;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: .25rem;
    font-weight: 600;
  }
  .brand-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.35rem;
    font-weight: 700;
    letter-spacing: -.01em;
    line-height: 1.1;
    color: #fff;
  }

  .inv-badge {
    text-align: right;
  }
  .inv-badge .label {
    font-size: .65rem;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: rgba(255,255,255,.45);
    margin-bottom: .2rem;
  }
  .inv-badge .value {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 600;
    color: var(--accent);
    line-height: 1;
  }

  /* Meta */
  .inv-meta {
    padding: 1.4rem 2.8rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: .6rem 2rem;
    border-bottom: 1px solid var(--border);
  }

  .meta-group label {
    display: block;
    font-size: .65rem;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: .3rem;
  }

  .editable {
    font-size: .875rem;
    color: var(--ink);
    background: transparent;
    border: none;
    border-bottom: 1.5px dashed var(--accent-dim);
    width: 100%;
    padding: .15rem 0;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color .15s;
  }
  .editable:focus { border-bottom-color: var(--accent); }
  .editable::placeholder { color: #bbb; }

  /* Divider */
  .divider {
    height: 3px;
    background: linear-gradient(90deg, var(--accent) 0%, var(--accent-dim) 60%, transparent 100%);
  }

  /* Items */
  .inv-items { padding: 1.5rem 2.8rem; }

  table { width: 100%; border-collapse: collapse; font-size: .875rem; }

  thead th {
    font-size: .65rem;
    letter-spacing: .13em;
    text-transform: uppercase;
    color: var(--ink-light);
    font-weight: 500;
    padding: 0 .5rem .75rem;
    border-bottom: 1px solid var(--border);
    text-align: left;
  }
  thead th.right { text-align: right; }

  tbody td {
    padding: .65rem .5rem;
    border-bottom: 1px solid var(--bg);
    vertical-align: middle;
  }
  tbody tr:last-child td { border-bottom: none; }

  .td-no { font-size: .75rem; color: var(--ink-light); font-weight: 600; width: 36px; }

  .td-product input, .td-num input {
    font-family: 'Inter', sans-serif;
    font-size: .875rem;
    color: var(--ink);
    border: none;
    background: transparent;
    width: 100%;
    outline: none;
    border-bottom: 1.5px dashed transparent;
    padding: .1rem 0;
    transition: border-color .15s;
  }
  .td-product input:focus, .td-num input:focus { border-bottom-color: var(--accent); }
  .td-product input::placeholder { color: #bbb; }
  .td-num input { text-align: right; }
  .td-total { font-weight: 600; text-align: right; width: 90px; }
  .td-action { width: 32px; text-align: center; }

  .del-row {
    background: none; border: none; cursor: pointer;
    color: #ccc; font-size: 1.1rem; line-height: 1;
    transition: color .15s; padding: 0 4px;
  }
  .del-row:hover { color: var(--danger); }

  .add-row-btn {
    margin-top: 1rem;
    background: none;
    border: 1.5px dashed var(--accent-dim);
    border-radius: 6px;
    padding: .5rem 1rem;
    font-family: 'Inter', sans-serif;
    font-size: .8rem;
    color: var(--ink-light);
    cursor: pointer;
    transition: all .15s;
    display: flex;
    align-items: center;
    gap: .4rem;
  }
  .add-row-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Totals */
  .inv-totals { padding: 0 2.8rem 1.6rem; display: flex; justify-content: flex-end; }
  .totals-box { width: 280px; }

  .totals-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: .4rem 0;
    font-size: .875rem;
    border-bottom: 1px solid var(--bg);
  }
  .totals-row label {
    font-size: .65rem;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--ink-light);
  }
  .totals-row .amt { font-weight: 500; }

  .tax-input {
    font-family: 'Inter', sans-serif;
    font-size: .875rem;
    width: 54px;
    border: none;
    border-bottom: 1.5px dashed var(--accent-dim);
    background: transparent;
    text-align: right;
    outline: none;
    color: var(--ink);
    padding: 0 2px;
  }
  .tax-input:focus { border-bottom-color: var(--accent); }

  .totals-total {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: .75rem;
    padding: .9rem 1rem;
    background: var(--ink);
    border-radius: 8px;
    color: #fff;
  }
  .totals-total .tot-label {
    font-size: .65rem; letter-spacing: .14em;
    text-transform: uppercase; color: rgba(255,255,255,.5);
  }
  .totals-total .tot-val {
    font-family: 'Playfair Display', serif;
    font-size: 1.35rem; font-weight: 700; color: var(--accent);
  }

  /* Notes */
  .inv-notes { padding: 0 2.8rem 1.4rem; }
  .inv-notes label {
    font-size: .65rem; letter-spacing: .13em;
    text-transform: uppercase; color: var(--ink-light);
    display: block; margin-bottom: .4rem;
  }
  .inv-notes textarea {
    width: 100%;
    font-family: 'Inter', sans-serif;
    font-size: .82rem; color: var(--ink);
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; padding: .6rem .8rem;
    resize: vertical; outline: none; min-height: 54px;
    transition: border-color .15s;
  }
  .inv-notes textarea:focus { border-color: var(--accent); }

  /* Footer */
  .inv-footer {
    background: var(--ink);
    color: rgba(255,255,255,.55);
    padding: 1rem 2.8rem;
    display: flex;
    justify-content: space-between;
    font-size: .78rem;
    flex-wrap: wrap;
    gap: .5rem;
    align-items: center;
  }
  .inv-footer span { color: rgba(255,255,255,.55); }

  /* Print */
  @media print {
    body { background: #fff; padding: 0; }
    .toolbar { display: none; }
    .invoice { border: none; border-radius: 0; box-shadow: none; max-width: 100%; }
    .del-row, .add-row-btn { display: none; }
    .editable, .td-product input, .td-num input, .tax-input, .inv-notes textarea {
      border-bottom: none; pointer-events: none;
    }
    .inv-notes textarea { background: #fff; border: none; }
    @page { margin: 1.2cm; size: A4; }
  }
</style>
</head>

  let rowCount = 0;

  function fmt(n) { return '$' + parseFloat(n || 0).toFixed(2); }

  function addRow(product='', qty=1, price=0) {
    rowCount++;
    const tbody = document.getElementById('line-items');
    const tr = document.createElement('tr');
    tr.dataset.id = rowCount;
    tr.innerHTML = `
      <td class="td-no">${rowCount}</td>
      <td class="td-product"><input placeholder="Item description" value="${product}" oninput="recalc()"></td>
      <td class="td-num"><input type="number" value="${qty}" min="0" oninput="recalc()"></td>
      <td class="td-num"><input type="number" value="${price}" min="0" step="0.01" oninput="recalc()"></td>
      <td class="td-total" id="row-total-${rowCount}">${fmt(qty * price)}</td>
      <td class="td-action"><button class="del-row" onclick="removeRow(this)" title="Remove">×</button></td>
    `;
    tbody.appendChild(tr);
    recalc();
  }

  function removeRow(btn) {
    btn.closest('tr').remove();
    renumber();
    recalc();
  }

  function renumber() {
    document.querySelectorAll('#line-items tr').forEach((tr, i) => {
      tr.querySelector('.td-no').textContent = i + 1;
    });
  }

  function recalc() {
    let sub = 0;
    document.querySelectorAll('#line-items tr').forEach(tr => {
      const inputs = tr.querySelectorAll('input[type=number]');
      if (inputs.length < 2) return;
      const qty = parseFloat(inputs[0].value) || 0;
      const price = parseFloat(inputs[1].value) || 0;
      const total = qty * price;
      const cell = document.getElementById('row-total-' + tr.dataset.id);
      if (cell) cell.textContent = fmt(total);
      sub += total;
    });
    const taxRate = parseFloat(document.getElementById('tax-rate').value) || 0;
    const taxAmt = sub * taxRate / 100;
    document.getElementById('subtotal').textContent = fmt(sub);
    document.getElementById('tax-amt').textContent = fmt(taxAmt);
    document.getElementById('grand-total').textContent = fmt(sub + taxAmt);
  }

  function clearInvoice() {
    if (!confirm('Clear all items and fields?')) return;
    document.getElementById('line-items').innerHTML = '';
    rowCount = 0;
    ['client-name','client-addr','inv-num','inv-date','notes'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = '';
    });
    document.getElementById('inv-num-display').textContent = '001';
    document.getElementById('tax-rate').value = 0;
    recalc();
  }

  document.getElementById('inv-date').value = new Date().toISOString().split('T')[0];
  addRow('', 1, 0);
</script>
